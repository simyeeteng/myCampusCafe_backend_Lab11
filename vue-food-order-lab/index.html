<!DOCTYPE html>
<html>

<head>
    <title>MyCampus Café SPA</title> <!-- UPDATED: title reflects SPA version -->
</head>

<body>
    <div id="app">
        <h1>{{ appTitle }}</h1>
        <!-- UPDATED: Vue Router navigation links for SPA page switching -->
        <nav>
            <!-- Vue Router function: router-link navigates without full page reload -->
            <router-link to="/">Home</router-link> |
            <router-link to="/add-order">Add Order</router-link> |
            <router-link to="/view-orders">View Orders</router-link>
        </nav>
        <hr>
        <!-- UPDATED: Vue Router function: router-view renders the matched route component -->
        <router-view></router-view>
    </div>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4"></script> <!-- UPDATED: add Vue Router CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
